domain=https://rhododendra.com
app.sign-in.enabled=false
environment=local
server.port=8090
spring.jackson.serialization.INDENT_OUTPUT=true

# Content-hash fingerprints for /css, /js, /imgs, etc. so browsers fetch new files after deploy
# while still caching aggressively (URL changes when file bytes change).
spring.web.resources.chain.enabled=true
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/**

# SQLite database location (file-based)
db.path=./data/rhododendra.sqlite

# Base directory for JSON input data (used for migration)
data.jsonDir=/Users/john.verwolf/code/hirsutum_scraper/outputs/data/

# OAuth2 (override with Google/ Facebook app credentials; dummy values allow local startup without real OAuth)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:dummy-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dummy-google-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.facebook.client-id=${FACEBOOK_CLIENT_ID:dummy-facebook-client-id}
spring.security.oauth2.client.registration.facebook.client-secret=${FACEBOOK_CLIENT_SECRET:dummy-facebook-client-secret}
spring.security.oauth2.client.registration.facebook.scope=public_profile,email
