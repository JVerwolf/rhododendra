app.sign-in.enabled=true
spring.datasource.url=jdbc:postgresql://127.0.0.1:1/overridden-by-testcontainers
spring.datasource.username=overridden
spring.datasource.password=overridden
lucene.index.base=build/test-lucene
data.jsonDir=./src/test/resources/testdata/json
domain=http://localhost

spring.security.oauth2.client.registration.google.client-id=test-google-client-id
spring.security.oauth2.client.registration.google.client-secret=test-google-client-secret
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.facebook.client-id=test-facebook-client-id
spring.security.oauth2.client.registration.facebook.client-secret=test-facebook-client-secret
spring.security.oauth2.client.registration.facebook.scope=public_profile,email
